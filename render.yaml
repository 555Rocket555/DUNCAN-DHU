services:
  - type: web
    name: duncan-dhu
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: duncan-dhu-db
          property: connectionString

databases:
  - name: duncan-dhu-db
    plan: free
    databaseName: duncan_dhu
    user: admin
