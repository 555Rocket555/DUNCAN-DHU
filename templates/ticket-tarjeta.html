<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C59PFRYZPE"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-C59PFRYZPE');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket - Duncan Dhu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/rappi-base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Principal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ticket-tarjeta.css') }}">
</head>

<body>

    <header class="site-header">
        <div class="container header-container">
            <a href="{{ url_for('public.home') }}" class="logo-link">
                <h1 class="logo-title">Duncan Dhu</h1>
            </a>

            <div style="display: flex; align-items: center; gap: 1rem;">
                {% if current_user.is_authenticated %}
                <span style="color: #FFD700; font-weight: 600;">{{ current_user.name }}</span>
                {% endif %}
                <a href="{{ url_for('auth.logout') }}" class="logout-button">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                        <path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2">
                        </path>
                        <path d="M9 12h12l-3 -3"></path>
                        <path d="M18 15l3 -3"></path>
                    </svg>
                    <span>Cerrar Sesión</span>
                </a>
            </div>
        </div>
    </header>

    <main class="ticket-viewer">
        <h2 style="text-align:center; margin-bottom: 1rem;">Pedido #{{ order.id }}</h2>
        <div class="ticket-image-container">
            <img src="{{ url_for('static', filename='img/ticket-completo.png') }}" alt="Ticket de compra Duncan Dhu">
        </div>
    </main>

</body>

</html>
