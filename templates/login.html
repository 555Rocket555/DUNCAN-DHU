{% extends 'base.html' %}

{% block title %}Duncan Dhu - Iniciar Sesión{% endblock %}

{% block content %}

<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="font-oswald text-4xl text-urban-yellow uppercase tracking-wider">Inicia Sesión</h1>
            <span class="urban-white"> ó </span><br>
            <a href=" {{ url_for('auth.register') }}"
                class="inline-block border-b-2 border-urban-yellow text-white font-oswald uppercase hover:text-urban-yellow transition-colors">
                Regístrate Aquí.
            </a>
        </div>

        <div class="bg-urban-surface border border-gray-800 p-8 urban-shadow relative overflow-hidden group">
            <!-- Decorative corner -->
            <div
                class="absolute top-0 right-0 w-16 h-16 bg-urban-yellow transform rotate-45 translate-x-8 -translate-y-8 z-0">
            </div>

            <form action="{{ url_for('auth.login') }}" method="post" class="space-y-6 relative z-10">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label for="usuario"
                        class="block font-oswald text-white uppercase tracking-wider mb-2">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Tu usuario"
                        class="w-full bg-black border border-gray-700 text-white p-4 focus:border-urban-yellow focus:outline-none font-archivo transition-colors placeholder-gray-600">
                </div>

                <div>
                    <label for="contrasena"
                        class="block font-oswald text-white uppercase tracking-wider mb-2">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Tu contraseña"
                        class="w-full bg-black border border-gray-700 text-white p-4 focus:border-urban-yellow focus:outline-none font-archivo transition-colors placeholder-gray-600">
                </div>

                <button type="submit" class="w-full urban-btn text-center text-sm tracking-widest">
                    Iniciar Sesión
                </button>
            </form>

            <div class="mt-8 text-center border-t border-gray-800 pt-6">
                <p class="font-archivo text-gray-400 text-sm mb-4">¿No recuerdas tu contraseña?</p>
                <a href="{{ url_for('auth.forgot_password') }}"
                    class="inline-block border-b-2 border-urban-yellow text-white font-oswald uppercase hover:text-urban-yellow transition-colors">
                    Recuperar Contraseña.
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
