<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C59PFRYZPE"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-C59PFRYZPE');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Duncan Dhu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/rappi-base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Principal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login-admin.css') }}">
</head>

<body>

    <main class="login-container">
        <div class="login-card">

            <header class="login-header">
                <img src="{{ url_for('static', filename='img/logo-chef-hat.png') }}" alt="Logo Duncan Dhu"
                    class="logo-image">
                <h1 class="logo-title">Duncan Dhu</h1>
                <p class="logo-subtitle">El deleite de la comida...</p>
            </header>

            <form class="login-form" action="{{ url_for('auth.admin_login') }}" method="post">
                <div class="form-group">
                    <label for="usuario">Usuario:</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario">
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña:</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña">
                </div>

                <button type="submit" class="submit-btn">Iniciar sesión</button>
            </form>

        </div>
    </main>

    <footer class="bottom-bar"></footer>

</body>

</html>
