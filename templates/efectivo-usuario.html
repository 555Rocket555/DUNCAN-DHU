{% extends 'base.html' %}

{% block title %}Duncan Dhu - Confirmar Efectivo{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">
    <div class="text-center mb-10">
        <h1 class="font-oswald text-4xl uppercase text-white">Datos de <span class="text-urban-yellow">Contacto</span>
        </h1>
        <p class="font-archivo text-gray-400 mt-2">Para enviarte el ticket de tu compra en efectivo.</p>
    </div>

    <div class="bg-urban-surface border border-gray-800 p-8 urban-shadow">
        <form action="{{ url_for('public.ticket_send') }}" method="post" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="order_id" value="{{ order.id }}">

            <div>
                <label for="nombre" class="block font-oswald text-white uppercase tracking-wider mb-2">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre"
                    class="w-full bg-black border border-gray-700 text-white p-4 focus:border-urban-yellow focus:outline-none font-archivo transition-colors placeholder-gray-600">
            </div>

            <div>
                <label for="whatsapp"
                    class="block font-oswald text-white uppercase tracking-wider mb-2">WhatsApp</label>
                <input type="tel" id="whatsapp" name="whatsapp" placeholder="55 1234 5678"
                    class="w-full bg-black border border-gray-700 text-white p-4 focus:border-urban-yellow focus:outline-none font-archivo transition-colors placeholder-gray-600">
            </div>

            <div>
                <label for="correo" class="block font-oswald text-white uppercase tracking-wider mb-2">Correo
                    Electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@email.com"
                    class="w-full bg-black border border-gray-700 text-white p-4 focus:border-urban-yellow focus:outline-none font-archivo transition-colors placeholder-gray-600">
            </div>

            <div>
                <label for="channel" class="block font-oswald text-white uppercase tracking-wider mb-2">Enviar ticket
                    por</label>
                <div class="relative">
                    <select id="channel" name="channel"
                        class="w-full bg-black border border-gray-700 text-white p-4 appearance-none focus:border-urban-yellow focus:outline-none font-archivo cursor-pointer">
                        <option value="whatsapp">WhatsApp</option>
                        <option value="correo">Correo</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-white">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full urban-btn text-center mt-4">
                Confirmar y Enviar
            </button>
        </form>

        {% if sent %}
        <div class="mt-6 bg-green-900/30 border border-green-500 p-4 flex items-start gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-500 flex-shrink-0" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            <div>
                <h3 class="font-oswald text-white uppercase">¡Ticket Enviado!</h3>
                <p class="font-archivo text-gray-300 text-sm">Revisa tu bandeja de entrada o WhatsApp.</p>
            </div>
        </div>
        {% endif %}
    </div>
</div>

{% endblock %}
