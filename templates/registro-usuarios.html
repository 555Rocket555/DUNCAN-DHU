<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C59PFRYZPE"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-C59PFRYZPE');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Duncan Dhu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/rappi-base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Principal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro-usuarios.css') }}">
</head>

<body>

    <header class="site-header">
        <div class="container header-container">
            <h1 class="logo-title">Duncan Dhu</h1>
            <h2 class="page-title">Registro de usuarios</h2>
            <a href="{{ url_for('public.home') }}" class="nav-button">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                    <path d="M15 12h-10"></path>
                    <path d="M9 8l-4 4l4 4"></path>
                </svg>
                <span>Pagina principal</span>
            </a>
        </div>
    </header>

    <main class="site-main">
        <div class="registration-container">
            <h3 class="form-title">Nuevo usuario</h3>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                <div class="flash-message {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form id="registration-form" class="registration-form" action="{{ url_for('auth.register') }}"
                method="post">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingresa nombre(s)">
                </div>

                <div class="form-group">
                    <label for="correo">Correo</label>
                    <input type="email" id="correo" name="correo" placeholder="correo@mail.com">
                </div>

                <div class="form-group">
                    <label for="telefono">Telefono</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>

                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario">
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña">
                </div>

                <button type="submit" class="submit-btn">¡Registrarse!</button>
            </form>

        </div>
    </main>

</body>

</html>
